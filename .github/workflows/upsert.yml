name: Continuous Upsert

on:
  push:
    branches:
      - main
    paths:
      - 'contents.json'
  workflow_dispatch:  # Allow manual triggering

jobs:
  upsert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync

      - name: Generate chunks from contents.json
        run: |
          uv run python -m src.shared.chunking.cli contents.json chunks.json

      - name: Upsert chunks to Qdrant
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          uv run embed-cli upsert --chunks chunks.json

      - name: Upload chunks.json artifact (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chunks
          path: chunks.json
          retention-days: 7

